# ---------------------------------------------------------------------------
# 筛选与分类规则
#
# 来源：classification_filters.py（上一版最好的一块代码，逻辑几乎原样保留）
#   - EXCLUDED_EVENT_TYPES  → excluded_event_types
#   - HEALTHCARE_CORE_...   → healthcare_core_keywords
#   - NEWS_TYPE_RULES       → event_types
#   - GOVERNMENT_KEYWORDS   → government_keywords
#   - run.py::filter_keywords / invalid_title_patterns → noise_keywords / invalid_titles
#
# 唯一的结构性改动：原来的 condition lambda 改成 exceptions 列表。
#   旧: "condition": lambda title, summary: not any(hkw in ... for hkw in [...])
#   新: exceptions: [...]
# 语义完全一致：命中 keywords 且【不】命中 exceptions → 排除。
# 好处：你改规则不用碰代码，且规则可被 diff、可被 review。
#
# ⚠️ 修掉的一个不对称：
#    旧 is_excluded_event_type 只在 title 里找 keywords，却在 title+summary 里找例外。
#    新版统一在 title + snippet 里找。
# ---------------------------------------------------------------------------

version: "2026-07-15"

# ===========================================================================
# 第 0 道：静态页 / 导航页 / 归档页
# 命中标题即丢弃。来源 run.py::invalid_title_patterns + filter_static_pages
# ===========================================================================
invalid_titles:
  - "archives"
  - "archive"
  - "| page"
  - "page 1"
  - "page 2"
  - "page 3"
  - "page 4"
  - "category"
  - "tag:"
  - "home |"
  - "about |"
  - "contact |"
  - "vision and mission"
  - "sitemap"
  - "search results"
  - "page not found"
  - "404"
  - "login"
  - "register"
  - "subscribe"
  - "newsletter"
  - "- stock analysis"        # 实证：simplywall.st 的股票静态页混进过页面
  - "stock price"
  - "share price history"

# ===========================================================================
# 第 1 道：核心事件类型排除（带例外）
# 这是上一版最好的设计：排除某类新闻，但如果涉及医疗主体则保留。
# 例：医院被炸 → 保留；一般军事冲突 → 排除
# ===========================================================================
excluded_event_types:

  军事冲突:
    keywords:
      ["strike", "bombing", "attack", "military operation", "air strike",
       "drone attack", "killed in", "casualties from", "iran strike",
       "israeli strike", "military"]
    exceptions:
      ["hospital", "medical center", "medical centre", "healthcare group",
       "clinic", "doctor", "nurse", "patient care", "health policy",
       "medical treatment"]

  人物讣闻:
    keywords:
      ["dies of", "death of", "obituary", "passed away", "funeral",
       "memorial", "stewardess", "singer dies", "actor dies",
       "multi-organ failure"]
    exceptions:
      ["hospital ceo", "hospital director", "medical pioneer", "doctor dies",
       "surgeon dies", "healthcare leader", "medical researcher",
       "health minister"]

  犯罪事故:
    keywords:
      ["murder", "crime", "arrest", "investigation", "trial", "court case",
       "accident", "crash", "fire at", "stampede", "assault",
       "run down", "motorcyclist", "hit by"]
    exceptions:
      ["hospital safety", "medical error", "patient safety",
       "healthcare fraud", "hospital fire safety", "medical malpractice"]

  一般政治:
    keywords:
      ["election", "vote", "campaign", "poll", "political party",
       "intelligence chief", "diplomat warns", "foreign minister",
       "dmk leader", "bjp leader", "congress leader", "opposition leader",
       "minister says", "returns from", "appears before", "face inquiry",
       "evading probe", "running away", "hiding"]
    exceptions:
      ["health minister", "health policy", "medical reform",
       "healthcare budget", "ministry of health", "health department"]

  房产广告:
    keywords:
      ["condo for rent", "apartment for rent", "property for sale",
       "house for sale", "land for sale", "real estate listing",
       "rental listing", "for rent in", "bedroom condo", "studio apartment",
       "office space for rent", "freehold", "for rent by", "condo for sale",
       "edgeprop.my", "propertyguru", "iproperty"]
    exceptions: []          # 始终排除（对应旧代码 lambda: True）

  体育新闻:
    keywords:
      ["football match", "basketball game", "cricket match", "tennis",
       "golf tournament", "sports team", "player signed", "coach",
       "olympic", "world cup", "championship game", "league",
       "scored", "win over", "defeated", "victory against"]
    exceptions:
      ["sports medicine", "athlete health", "sports injury",
       "physical therapy", "orthopedic"]

  # 以下三类来自旧 run.py::filter_keywords，原本是无例外的硬排除。
  # 迁进来后统一加上例外机制。
  个人生活:
    keywords:
      ["baby", "babies", "birth", "born", "pregnant", "pregnancy",
       "wedding", "marriage", "divorce", "patient story", "patient shares",
       "miracle", "survivor", "recovery story"]
    exceptions:
      ["maternity ward", "fertility clinic", "ivf", "birth rate",
       "obstetrics", "neonatal", "reproductive health"]

  节庆活动:
    keywords:
      ["eid", "festival", "celebration", "holiday", "christmas",
       "new year", "ramadan", "anniversary", "birthday", "tribute",
       "ceremony", "award ceremony"]
    exceptions:
      ["opening ceremony", "groundbreaking ceremony", "grand opening",
       "signing ceremony", "accreditation", "jci"]
      # ⚠️ 医院开业/签约仪式是真动态，不能跟节庆一起丢
      # 实证：Pop Meals 那条清真认证仪式会被「节庆活动」拦下 ✅

  天气:
    keywords:
      ["feels like", "heat wave", "heat & humidity", "heat advisory",
       "heat warning", "extreme heat"]
    exceptions:
      ["heat stroke", "heat related illness", "hospital admissions"]

# ===========================================================================
# 第 2 道：医疗核心主题硬门槛
# 必须至少命中一个，否则丢弃。来源 run.py::is_healthcare_relevant
# 这是你写的那道闸门 —— 旧 is_healthcare_industry_news 只要命中一个泛词
# （"ai" / "sign" / "board"）就放行，宽得离谱。
# ===========================================================================
