  # 医疗机构
  ["hospital", "clinic", "medical centre", "medical center", "healthcare",
   "health care", "nursing home", "care home", "rehabilitation", "rehab",
   # 医疗主体
   "patient", "doctor", "physician", "surgeon", "nurse", "medical staff",
   "dentist", "specialist", "consultant",
   # 医疗行为
   "surgery", "operation", "treatment", "diagnosis", "diagnostic",
   "procedure", "medical procedure", "health service", "medical service",
   # 疾病与治疗领域
   "cancer", "oncology", "cardiology", "heart", "neurology", "brain",
   "dialysis", "transplant", "ivf", "fertility", "medical tourism",
   # 疫情与传染病
   "dengue", "tuberculosis", "ebola", "malaria", "outbreak", "pandemic",
   "epidemic", "nipah", "cholera", "measles", "virus", "infection",
   "infectious",
   # 医疗政策与监管
   "health ministry", "ministry of health", "health department",
   "health authority", "health minister", "health official",
   "health secretary", "medical regulation", "health regulation",
   "medical license", "health insurance", "medicare", "medicaid",
   "health policy", "medical policy", "health system", "healthcare system",
   "health workforce", "health planning", "health partnership",
   "global health", "public health",
   # 健康主题
   "women's health", "men's health", "child health", "adolescent health",
   "mental health", "reproductive health", "sexual health",
   "health screening", "health check", "bone density", "mammogram",
   # 医疗技术与产品
   "medical device", "medical equipment", "medical technology",
   "pharmaceutical", "drug", "medicine", "vaccine", "clinical", "trial",
   "drug approval",
   # 中医/亚洲医疗
   "traditional medicine", "herbal", "中医", "草药", "仿制药", "药房",
   # 其他
   "medical use", "medical model", "medical cannabis", "health alert",
   "telemedicine", "telehealth", "ambulance", "emergency medical",
   "disease surveillance", "health declaration", "genomics", "genome",
   "genome sequencing", "life sciences", "biotech", "biotechnology",
   "glp-1", "weight loss drug", "obesity", "diabetes", "chronic disease",
   "healthcare giant", "health-care giant", "disease control",
   "disease prevention"]

# ===========================================================================
# 第 3 道：事件类型分类
# priority 小 = 优先级高。一条新闻命中多类时取 priority 最小的。
# ⚠️ 这 11 个名称必须与飞书「事件类型」单选字段的选项【逐字一致】
# ===========================================================================
government_keywords:
  ["ministry", "government", "minister", "official", "authority",
   "department", "regulatory", "federal", "state", "policy",
   "卫生部", "政府", "部长"]

event_types:

  - name: 资本运作
    priority: 1
    keywords:
      ["acquire", "acquisition", "merger", "merge", "buy", "purchase",
       "sold", "ipo", "listing", "listed", "funding", "investment",
       "invest", "stake", "equity", "shareholder", "valuation",
       "private equity"]

  - name: 扩张/新设
    priority: 2
    keywords:
      ["new hospital", "open hospital", "launch hospital", "expand",
       "expansion", "new branch", "new centre", "new center", "new clinic",
       "new facility", "construction", "break ground", "grand opening",
       "enter market"]

  - name: 合作/合资
    priority: 3
    keywords:
      ["partnership", "partner", "collaborate", "collaboration", "alliance",
       "agreement", "mou", "memorandum", "joint venture", "strategic"]

  - name: 人事变动
    priority: 4
    keywords:
      ["ceo", "chief executive", "appointed", "appointment", "new head",
       "resign", "resignation", "step down", "promoted", "director"]

  - name: 技术/创新
    priority: 5
    keywords:
      ["ai", "artificial intelligence", "machine learning", "digital",
       "robot", "robotic", "new technology", "innovation", "smart hospital",
       "telehealth", "telemedicine"]

  - name: 财务业绩
    priority: 6
    keywords:
      ["revenue", "profit", "earnings", "quarterly", "annual report",
       "financial results", "sales growth", "ebitda"]

  - name: 认证/荣誉
    priority: 7
    keywords:
      ["jci", "accreditation", "certification", "award", "ranking",
       "top hospital", "best hospital", "certified"]

  - name: 医疗旅游
    priority: 8
    keywords:
      ["medical tourism", "international patient", "patient from abroad",
       "overseas patient", "tourism revenue"]

  - name: 政策法规
    priority: 9
    require_government_entity: true    # 必须同时命中 government_keywords
    keywords:
      ["ministry of health", "health ministry", "health minister",
       "health policy", "healthcare policy", "regulation", "regulatory",
       "government", "health reform", "healthcare reform", "legislation",
       "health law", "medical regulation"]

  - name: 公共卫生
    priority: 10
    keywords:
      ["outbreak", "epidemic", "pandemic", "vaccine", "vaccination",
       "disease control", "public health", "health alert"]

  - name: 行业新闻
    priority: 11
    is_default: true                   # 兜底，前 10 类都没命中时用
    keywords: []

# ===========================================================================
# 第 4 道：模型精筛（新增 —— 关键词层拦不住的交给它）
# ===========================================================================
# 实证：这两条现在就在你的线上页面上，纯关键词无法拦截
#   1. "Pop Meals Celebrates Halal Certification with Official Ceremony
#       at Pantai Hospital Outlet"
#      → 餐饮品牌在医院门店办活动，Pantai 只是【地点】不是主体
#   2. "9 Proven Cocaine Rehab Centres in Chiang Mai – 2026 Guide"
#      → SEO 软文列表页，根本不是新闻
#
# 判定结果写入 data/audit/*.jsonl（私有留痕），不进飞书主表、不进网页。
model_filter:
  enabled: true
  model: qwen-plus
  max_workers: 8
  timeout: 30
  criteria:
    - "这条是不是一则真实的新闻报道？（不是广告、SEO列表页、导航页、股票行情页）"
    - "目标机构是不是这条新闻的【主体】？（只是提到名字、或仅作为事件发生地点 → 否）"
    - "这条是不是医疗行业的经营/战略动态？（患者个案、纯科普、活动通稿 → 否）"
  # 三问全为「是」才入库；任一为「否」→ included=false + reason 落审计日志

# ===========================================================================
# URL 规范化（新增）
# ===========================================================================
# 实证：Firecrawl 返回过这种 URL
#   http://www.msn.com/en-xl/news/other/ihh-singapore-.../ar-AA27OINR
#     ?apiversion=v2&domshim=1&noservercache=1&noservertelemetry=1
#     &batchservertelemetry=1&renderwebcomponents=1&wcseo=1
# 三个问题叠加：聚合器转载（同一篇文章两个 URL）+ 每次不同的 tracking 参数
#              + http 而非 https  → URL 去重完全失效
url_normalize:
  strip_query_params: true       # 剥掉全部 query（新闻 URL 极少依赖 query）
  strip_fragment: true           # 剥掉 #anchor
  force_https: true
  strip_www: true
  strip_trailing_slash: true

# 域名黑名单：整站丢弃，不进漏斗。
# 比标题关键词稳得多 —— 房产站/招聘站的标题千变万化，域名不变。
# 全部来自 2026-07-15 探针的实证。
blocked_domains:
  # 房产 / 分类信息
  ["edgeprop.sg", "edgeprop.my", "mudah.my", "propertyguru.com.sg",
   "propertyguru.com.my", "iproperty.com.my", "thailand-property.com",
   # 招聘
   "indeed.com", "jobstreet.com", "fastjobs.sg", "recruit.com.hk",
   "linkedin.com", "bold.pro",
   # 社交（news 源正常不会返回，防御性）
   "instagram.com", "facebook.com", "tiktok.com", "twitter.com", "x.com",
   # 股票行情站
   "simplywall.st", "moomoo.com", "scanx.trade", "whalesbook.com",
   "klsescreener.com", "tradebrains.in", "marketsmojo.com",
   "news.futunn.com", "investing.com", "cn.investing.com"]

# 聚合器域名：转载源，同一内容会重复出现。
# 不直接丢弃（有时只有它有），但标记出来，去重时优先保留原发媒体。
aggregator_domains:
  ["msn.com", "news.google.com", "finance.yahoo.com", "news.yahoo.com",
   "tradingview.com", "simplywall.st", "moomoo.com", "scanx.trade",
   "investing.com", "marketscreener.com"]

# 去重三道
dedupe:
  by_url: true
  by_title_similarity: 0.80      # 机构新闻，来源 deduplicate_by_similarity
  by_title_similarity_sea: 0.85  # 东南亚动态，旧代码用的是 0.85
  prefer_non_aggregator: true    # 标题几乎相同时，保留非聚合器的那条

# ===========================================================================
# 行业新闻通道（2026-07-15 新增）
# ===========================================================================
# 机构 query 搜回来但没匹配上任何 alias 的条目，旧版直接丢。
# 实证发现里面有真情报：
#   "Six hospitals probed over birth-record scam"          泰国私立医院造假丑闻
#   "Malaysia healthcare kept at Market Weight"            板块估值
#   "Thai Hospital Stocks Rally as Broker Sees Valuation"  竞争格局
#   "Australia Pairs Up with Thailand ... Medical Tourism" 医疗旅游
#   "Selangor identifies Taman Medan as site for hospital" 新建项目
# 这些不是那 26 家的新闻，但是医疗行业动态 —— 战略价值不低。
industry_channel:
  enabled: true
  board_name: "行业动态"      # 网页板块名，排在国家板块之后
  entity_field: ""            # 飞书「机构」字段留空；「国家/地区」照常填
  # 进入条件：没匹配上机构 AND 过 healthcare_core AND 未被 excluded_event_types 排除
  #           AND 过模型精筛

# 时间窗口
retention:
  max_days: 7                    # 网页保留天数；飞书底稿不受此限，全量累积
