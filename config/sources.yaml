#   - 新增 印尼/越南/菲律宾：sea_health 本来就在搜这三国，
#     旧版没有对应板块，它们只能掉进「其他」
boards:
  - {name: "IHH集团",   flag: "🌐"}
  - {name: "新加坡",    flag: "🇸🇬"}
  - {name: "马来西亚",  flag: "🇲🇾"}
  - {name: "泰国",      flag: "🇹🇭"}
  - {name: "印尼",      flag: "🇮🇩"}
  - {name: "越南",      flag: "🇻🇳"}
  - {name: "菲律宾",    flag: "🇵🇭"}
  - {name: "印度",      flag: "🇮🇳"}
  - {name: "行业动态",  flag: "📊"}
  - {name: "其他",      flag: "🌏"}


# ===================== 行业新闻源 =====================
# 旧 targets.json::news_sources。用 site: 限定搜索。

news_sources:
  - name: Healthcare Asia News
    site: healthcareasia.asia
    keywords: ["hospital", "healthcare", "medical tourism"]

  - name: Medical Tourism Association
    site: medicaltourismassociation.com
    keywords: ["medical tourism", "international patient"]

  - name: Hospital Management
    site: hospitalmanagement.net
    keywords: ["hospital", "healthcare management"]

  - name: Healthcare Global
    site: healthcareglobal.com
    keywords: ["healthcare", "hospital", "medical"]


# ===================== 东南亚卫生动态 =====================
# 旧 targets.json::sea_health_news
# ⚠️ 旧代码有硬编码截断：sites[:1] 和 keywords[:2]
#    → 配了 3 站点 × 5 关键词，实际只跑 1×2。配置写了个寂寞。
# 新版把限制显式写在这里，不再藏在代码里。

sea_health:
  max_sites_per_country: 1     # 旧代码的 sites[:1]，先保持一致
  max_keywords_per_site: 2     # 旧代码的 keywords[:2]，先保持一致
  limit: 3

  keywords:
    - "healthcare policy"
    - "health ministry"
    - "medical regulation"
    - "health insurance"
    - "hospital regulation"

  countries:
    - name: 新加坡
      sites: ["moh.gov.sg", "channelnewsasia.com", "straitstimes.com"]
    - name: 马来西亚
      sites: ["moh.gov.my", "thestar.com.my", "malaymail.com"]
    - name: 泰国
      sites: ["moph.go.th", "bangkokpost.com", "nationthailand.com"]
    - name: 印尼
      sites: ["kemkes.go.id", "thejakartapost.com", "kompas.com"]
    - name: 越南
      sites: ["moh.gov.vn", "vnexpress.net", "tuoitrenews.vn"]
    - name: 菲律宾
      sites: ["doh.gov.ph", "inquirer.net", "rappler.com"]
    - name: 印度
      sites: ["mohfw.gov.in", "health.economictimes.indiatimes.com", "hindustantimes.com"]


# ===========================================================================
# 匹配规则（新版行为，与旧代码不同 —— 实现时必须遵守）
# ===========================================================================
#
# 1. 词边界匹配，不是子串匹配
#      旧: if alias in content
#      新: if re.search(rf"\b{re.escape(alias)}\b", content)
#    这让短别名（ihh / kpj / sgh / bdms / sjmc）全部安全可用。
#    旧代码因为用子串匹配，被迫删掉或收紧短别名 —— 现在不用了。
#
# 2. 最长匹配优先
#    一条新闻同时命中多个实体的别名时，取【最长别名】对应的实体。
#      "Parkway East Hospital expands" → "parkway east"(12) vs "parkway"(7)
#                                       → Parkway East Hospital
#      "Parkway to invest RM500m"      → 只有 "parkway"
#                                       → Parkway Pantai
#    旧代码靠字典遍历顺序，结果不可预测 —— 这是个隐性 bug。
#
# 3. 板块归属
#    group == "IHH Healthcare"  → 归入「IHH集团」板块（不按国家细分）
#    其余                        → 按 country 归板块
#    country 字段对 IHH 系机构仅作记录，不参与分组。
#
# 4. 板块顺序（土耳其已移除 —— Acibadem 归入 IHH集团后该板块恒为空）
#    LOCATION_ORDER = ["IHH集团", "新加坡", "马来西亚", "泰国", "印度", "其他"]
#
# ===========================================================================
# 决策记录（2026-07-15）
# ===========================================================================
