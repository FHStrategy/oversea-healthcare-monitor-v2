# ① Acibadem 别名移除 "ihh"           ✅ 已确认 —— 旧代码 bug，IHH ≠ Acibadem
# ② "mount e" 移除                    ✅ 无争议
# ③ "parkway" 冲突                    ✅ 已确认 —— 新建 Parkway Pantai 实体接管，
#                                        靠最长匹配与 Parkway East 共存
# ④ 裸 "pantai" → "pantai hospital"   ✅ 收紧（pantai = 马来语「海滩」）
# ⑤ 裸 "fortis" → "fortis healthcare" ✅ 收紧（Fortis Inc. 是加拿大公用事业公司）
# ⑥ 裸 "praram"/"paolo" 收紧          ✅ 收紧
# A. IHH 不按国家细分                  ✅ 已确认
# B. queries 暂不扩展                  ✅ 已确认 —— 先跑一版看召回
# C. sea_health 截断暂不放开           ✅ 已确认 —— 1站点 × 2关键词
#
# 遗留：裸 "ihh" 最初被我误删（理由「三字母太短」），实为误判 ——
#      真正的解法是词边界匹配而非删别名。已加回 IHH Healthcare。
      - "IHH Healthcare"
    aliases: ["ihh", "ihh healthcare", "ihh berhad"]
    # 裸 "ihh" 安全，因为匹配用【词边界】而非子串：\bihh\b
    # 能命中 "IHH's Q3 revenue"、"(IHH)"、"IHH-owned"，不会误伤

  - name: Mount Elizabeth Hospital
    country: 新加坡
    group: IHH Healthcare
    newsweek_rank: "新加坡 #5"
    queries:
      - "Mount Elizabeth Hospital Singapore"
    aliases: ["mount elizabeth", "mt elizabeth", "mount e hospital"]
    # 旧别名 "parkway" 移交给新建的 Parkway Pantai 实体（最长匹配优先）

  - name: Parkway East Hospital
