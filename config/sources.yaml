# ---------------------------------------------------------------------------
# 海外医疗集团动态监测 — 监测目标配置
#
# 来源合并说明：
#   - 机构清单 / 国家 / 集团  ← 旧 config/targets.json (25 个实体)
#   - aliases                ← 旧 run.py::is_entity_specific_news 的 entity_aliases
#   - newsweek_rank          ← 仅存档，不进任何逻辑（2026-07 决定不展示）
#
# 两个列表用途不同，不要混：
#   queries : 拿去 Firecrawl 搜索的字符串。必须【具体、能消歧】，
#             否则搜 "Pantai" 会返回一堆海滩新闻（pantai = 马来语「海滩」）。
#   aliases : 拿来判断「这条新闻是不是真的在讲这家机构」的匹配词。
#             必须【宽松】，全小写，做子串匹配。
#
# 旧代码只把 aliases 用于过滤，没用于搜索 —— 等于知道别名却不拿去召回。
# 新版两处都用：aliases 里够具体的会被提升为 query。
# ---------------------------------------------------------------------------

version: "2026-07-15"

defaults:
  limit: 10                    # 每个 query 返回条数上限
  tbs: "qdr:d,sbd:1"           # 过去24h + 按日期排序（2026-07-15 实测 tbs 对 news 源生效）
  sources: ["news"]            # 必须带，否则 Firecrawl 返回 web 结果且【没有 date 字段】

entities:

  # ===================== IHH Healthcare 集团 =====================
  # 决策（已确认）：IHH 相关新闻不按国家细分，统一归入「IHH集团」板块。
  # country 字段仍保留机构物理所在地，仅作为记录，不用于页面分组。

  - name: IHH Healthcare
    country: 新加坡
    group: IHH Healthcare
    is_group_hq: true
    queries:
      - "IHH Healthcare"
    aliases: ["ihh", "ihh healthcare", "ihh berhad"]
    # 裸 "ihh" 安全，因为匹配用【词边界】而非子串：\bihh\b
    # 能命中 "IHH's Q3 revenue"、"(IHH)"、"IHH-owned"，不会误伤

  - name: Mount Elizabeth Hospital
    country: 新加坡
    group: IHH Healthcare
    newsweek_rank: "新加坡 #5"
    queries:
      - "Mount Elizabeth Hospital Singapore"
    aliases: ["mount elizabeth", "mt elizabeth", "mount e hospital"]
    # 旧别名 "parkway" 移交给新建的 Parkway Pantai 实体（最长匹配优先）

  - name: Parkway East Hospital
    country: 新加坡
    group: IHH Healthcare
    queries:
      - "Parkway East Hospital Singapore"
    aliases: ["parkway east"]

  - name: Parkway Pantai
    country: 新加坡
    group: IHH Healthcare
    is_brand: true
    note: "IHH 在新马的运营品牌，旗下含 Mount Elizabeth / Gleneagles / Pantai 等"
    queries:
      - "Parkway Pantai"
    aliases: ["parkway pantai", "parkway group", "parkway"]
    # 裸 "parkway" 放这里做兜底：只说 Parkway 不点名医院的品牌级新闻归这里。
    # 与 "parkway east" 的冲突由【最长匹配优先】解决：
    #   "Parkway East Hospital expands" → 命中 "parkway east"(12) 和 "parkway"(7)
    #                                    → 长的赢 → Parkway East Hospital ✅
    #   "Parkway to invest RM500m"      → 只命中 "parkway" → Parkway Pantai ✅

  - name: Pantai Hospitals
    country: 马来西亚
    group: IHH Healthcare
    newsweek_rank: "马来西亚 #5"
    queries:
      - "Pantai Hospital Malaysia"
    aliases: ["pantai hospital", "pantai holdings"]
    weak_aliases: ["pantai"]
    # pantai = 马来语「海滩」，裸词太宽 -> 降为弱别名（需医疗核心词背书）

  - name: Gleneagles Kuala Lumpur
    country: 马来西亚
    group: IHH Healthcare
    newsweek_rank: "马来西亚 #2"
    queries:
      - "Gleneagles Hospital Kuala Lumpur"
    aliases: ["gleneagles kl", "gleneagles kuala lumpur", "gleneagles"]

  - name: Subang Jaya Medical Centre
    country: 马来西亚
    group: IHH Healthcare
    newsweek_rank: "马来西亚 #3"
    queries:
      - "Subang Jaya Medical Centre"
      - "SJMC hospital Malaysia"      # ← 新增：别名提升为 query
    aliases: ["subang jaya medical", "sjmc"]

  - name: Island Hospital
    country: 马来西亚
    group: IHH Healthcare
    newsweek_rank: "马来西亚 #7 (2026)"
    note: "2024年被IHH收购"
    queries:
      - "Island Hospital Penang"       # ← 加了 Penang 消歧
    aliases: ["island hospital"]

  - name: Prince Court Medical Centre
    country: 马来西亚
    group: IHH Healthcare
    newsweek_rank: "马来西亚 #4 (2026)"
    queries:
      - "Prince Court Medical Centre"
    aliases: ["prince court"]

  - name: Fortis Healthcare
    country: 印度
    group: IHH Healthcare
    queries:
      - "Fortis Healthcare India"
    aliases: ["fortis healthcare", "fortis hospital", "fortis escorts",
