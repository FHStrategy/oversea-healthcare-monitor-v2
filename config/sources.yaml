    weak_aliases: ["fortis"]
    # 裸 "fortis" 降为弱别名：Fortis Inc.（加拿大公用事业）不带医疗词 -> 不匹配；
    # "Fortis' takeover by an international healthcare chain" 带 healthcare -> 匹配。
    # 实证：2026-07-16 那条 IHH 收购 Fortis 的分析文章就是这么丢的。
    # 裸 "fortis" 不能用：Fortis Inc. 是加拿大上市公用事业公司。
