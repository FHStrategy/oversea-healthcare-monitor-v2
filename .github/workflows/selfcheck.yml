name: 自检

on:
  workflow_dispatch:

jobs:
  selfcheck:
    name: 导入 + 签名 + 配置校验
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests pyyaml
      - name: 跑自检
        run: python src/selfcheck.py
